name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - name: Agent debug instrumentation
      run: |
        # #region agent log
        echo "DBG|sessionId=bd86f8|runId=pre-fix|hypothesisId=H1|location=.github/workflows/ci.yml|message=checkout_action_version|data=actions/checkout@v4"
        echo "DBG|sessionId=bd86f8|runId=pre-fix|hypothesisId=H2|location=.github/workflows/ci.yml|message=setup_java_action_version|data=actions/setup-java@v4"
        echo "DBG|sessionId=bd86f8|runId=pre-fix|hypothesisId=H3|location=.github/workflows/ci.yml|message=runner_node_version|data=$(node --version)"
        echo "DBG|sessionId=bd86f8|runId=pre-fix|hypothesisId=H4|location=.github/workflows/ci.yml|message=force_node24_env|data=${FORCE_JAVASCRIPT_ACTIONS_TO_NODE24:-unset}"
        # #endregion
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Run unit tests
      run: ./gradlew test
