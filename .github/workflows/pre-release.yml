name: Pre-Release Build

on:
  workflow_dispatch:
  push:
    tags: [ "*pre-release" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Agent debug instrumentation
      run: |
        # #region agent log
        echo "DBG|sessionId=bd86f8|runId=pre-fix|hypothesisId=H1|location=.github/workflows/pre-release.yml|message=checkout_action_version|data=actions/checkout@v4"
        echo "DBG|sessionId=bd86f8|runId=pre-fix|hypothesisId=H2|location=.github/workflows/pre-release.yml|message=setup_java_action_version|data=actions/setup-java@v4"
        echo "DBG|sessionId=bd86f8|runId=pre-fix|hypothesisId=H3|location=.github/workflows/pre-release.yml|message=upload_artifact_action_version|data=actions/upload-artifact@v4"
        echo "DBG|sessionId=bd86f8|runId=pre-fix|hypothesisId=H4|location=.github/workflows/pre-release.yml|message=runner_node_version|data=$(node --version)"
        # #endregion
    - name: Extract tag name
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
    - name: Set up environment variables
      run: |
        echo "GPR_USER=${{ github.actor }}" >> $GITHUB_ENV
        echo "GPR_KEY=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
        echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        echo "KEYSTORE_BASE64=${{ secrets.KEYSTORE_BASE64 }}" >> $GITHUB_ENV
        echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build

    - name: Archive APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create Release
      id: create_release
      uses: ncipollo/release-action@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: ${{ github.ref_name }}
        prerelease: true
        generateReleaseNotes: false
        artifacts: app/build/outputs/apk/release/app-release.apk, app/manifest.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
